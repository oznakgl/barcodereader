<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>🔍 Barkod Okuyucu Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: linear-gradient(135deg, rgba(255,107,53,0.95), rgba(255,71,87,0.95));
            padding: 10px 14px;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { background: rgba(255, 255, 255, 0.2); }
            50% { background: rgba(255, 255, 255, 0.35); }
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .header-title h1 {
            font-size: 17px;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .header-title p {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.9);
            margin: 2px 0 0 0;
        }

        .header-stats {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 9px;
            color: white;
            font-weight: 600;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .scanner-section {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .laser-effect {
            position: absolute;
            width: 85%;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 100, 100, 1) 50%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            animation: laserScroll 1s ease-in-out infinite;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(255, 100, 100, 1), 0 0 24px rgba(255, 0, 0, 0.8);
            z-index: 10;
        }

        @keyframes laserScroll {
            0% { top: 10%; box-shadow: 0 0 8px rgba(255, 100, 100, 0.8); }
            50% { top: 50%; box-shadow: 0 0 14px rgba(255, 255, 100, 1), 0 0 28px rgba(255, 100, 100, 1); }
            100% { top: 90%; box-shadow: 0 0 8px rgba(255, 100, 100, 0.8); }
        }

        .scan-frame {
            position: absolute;
            width: 70%;
            aspect-ratio: 1;
            border: 2px dashed rgba(255, 107, 53, 0.5);
            border-radius: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 7;
            animation: framePulse 2.5s ease-in-out infinite;
        }

        @keyframes framePulse {
            0%, 100% { border-color: rgba(255, 107, 53, 0.3); box-shadow: none; }
            50% { border-color: rgba(255, 107, 53, 0.7); box-shadow: 0 0 12px rgba(255, 107, 53, 0.5); }
        }

        .corner-marks {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 107, 53, 0.7);
        }

        .corner.top-left {
            top: 50%;
            left: 50%;
            transform: translate(calc(-70vw / 2 - 10px), calc(-70vw / 2 - 10px));
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: 50%;
            left: 50%;
            transform: translate(calc(70vw / 2 + 10px - 20px), calc(-70vw / 2 - 10px));
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            top: 50%;
            left: 50%;
            transform: translate(calc(-70vw / 2 - 10px), calc(70vw / 2 + 10px - 20px));
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            top: 50%;
            left: 50%;
            transform: translate(calc(70vw / 2 + 10px - 20px), calc(70vw / 2 + 10px - 20px));
            border-left: none;
            border-top: none;
        }

        .info-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(0, 0, 0, 0.7);
            padding: 7px 12px;
            border-radius: 6px;
            z-index: 8;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-4px); }
        }

        .result-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: linear-gradient(135deg, #ffffff, #f5f5f5);
            border-top: 2px solid #FF6B35;
        }

        .result-panel.show {
            max-height: 300px;
            overflow-y: auto;
        }

        .result-inner {
            padding: 12px;
            color: #333;
        }

        .result-item {
            margin-bottom: 10px;
            background: white;
            padding: 11px;
            border-radius: 8px;
            border-left: 4px solid #FF6B35;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .result-item strong {
            display: block;
            color: #FF6B35;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .result-value {
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #222;
            font-weight: 600;
            line-height: 1.4;
        }

        .result-value a {
            color: #0066cc;
            text-decoration: none;
            border-bottom: 2px solid #0066cc;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-top: 9px;
        }

        .btn {
            border: none;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-copy {
            background: linear-gradient(135deg, #FF6B35, #FF4757);
            color: white;
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        .btn-approve {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-approve:active {
            transform: scale(0.95);
        }

        .status {
            display: block;
            background: linear-gradient(135deg, #FF6B35, #FF4757);
            color: white;
            padding: 6px;
            border-radius: 6px;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .history-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: linear-gradient(135deg, #ffffff, #f9f9f9);
            border-top: 2px solid #FF6B35;
        }

        .history-panel.show {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-inner {
            padding: 12px;
            color: #333;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-title {
            font-size: 12px;
            font-weight: 700;
            color: #FF6B35;
        }

        .history-count {
            background: #FF6B35;
            color: white;
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            background: white;
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            border-left: 3px solid #FF6B35;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .history-item-text {
            flex: 1;
            word-break: break-all;
            color: #222;
        }

        .history-item-delete {
            background: #f0f0f0;
            border: none;
            color: #f44;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 14px;
            padding: 18px;
            max-width: 85%;
            color: #333;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
        }

        .modal-header {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modal-icon {
            width: 32px;
            height: 32px;
            background: #FF6B35;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 700;
            align-self: center;
        }

        .modal-text {
            font-size: 12px;
            background: #f9f9f9;
            padding: 11px;
            border-radius: 8px;
            border-left: 4px solid #FF6B35;
            margin-bottom: 12px;
            word-break: break-all;
            max-height: 140px;
            overflow-y: auto;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .modal-btn {
            border: none;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
        }

        .modal-yes {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .modal-no {
            background: #f0f0f0;
            color: #333;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 107, 53, 0.5);
            border-radius: 3px;
        }

        @media (max-width: 480px) {
            .header-title h1 { font-size: 15px; }
            .result-panel.show { max-height: 280px; }
            .history-panel.show { max-height: 180px; }
        }

        @media (orientation: landscape) {
            .header-title h1 { font-size: 14px; }
            .result-panel.show { max-height: 130px; }
            .history-panel.show { max-height: 130px; }
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .error-message h2 {
            color: #f44;
            margin-bottom: 10px;
        }

        .error-message p {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .error-message button {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-left">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4m6 0h4a2 2 0 0 0 2-2v-4M9 7h6M9 17h6M6 6h.01M6 18h.01M18 6h.01M18 18h.01"></path>
                </svg>
            </div>
            <div class="header-title">
                <h1>🔍 Barkod Pro</h1>
                <p>Akıllı Tarama Sistemi</p>
            </div>
        </div>
        <div class="header-stats">
            <span id="scanCount">0</span> Tarama
        </div>
    </div>

    <div class="main-container">
        <div class="scanner-section">
            <div id="reader"></div>
            <div class="scan-frame"></div>
            <div class="laser-effect"></div>
            <div class="corner-marks">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>
            <div class="info-text">📱 Barkodu kareye yerleştir</div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="result-inner">
                <div class="result-item">
                    <strong>📊 Okunan Veri</strong>
                    <div class="result-value" id="resultText"></div>
                </div>
                <div class="result-item">
                    <strong>🏷️ Barkod Tipi</strong>
                    <div class="result-value" id="resultFormat"></div>
                </div>
                <div class="button-row">
                    <button class="btn btn-copy" id="copyBtn">📋 Kopyala</button>
                    <button class="btn btn-approve" id="approveBtn">✓ Onayla</button>
                </div>
                <div class="status">✓ Başarıyla Tarandı</div>
            </div>
        </div>

        <div class="history-panel" id="historyPanel">
            <div class="history-inner">
                <div class="history-header">
                    <div class="history-title">📜 Onaylı Taramalar</div>
                    <div class="history-count" id="historyCount">0</div>
                </div>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-icon">✓</div>
                <div class="modal-title">Listeye Ekle?</div>
            </div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-yes" id="modalYes">✓ Evet</button>
                <button class="modal-btn modal-no" id="modalNo">✕ İptal</button>
            </div>
        </div>
    </div>

    <div class="error-message" id="errorMsg" style="display: none;">
        <h2>⚠️ Kamera Açılamadı</h2>
        <p id="errorText"></p>
        <button onclick="location.reload()">Yenile</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script>
        const state = {
            lastScanned: '',
            lastTime: 0,
            history: [],
            pending: null,
            scanner: null,
            audio: null
        };

        const DOM = {
            scanCount: document.getElementById('scanCount'),
            resultPanel: document.getElementById('resultPanel'),
            resultText: document.getElementById('resultText'),
            resultFormat: document.getElementById('resultFormat'),
            copyBtn: document.getElementById('copyBtn'),
            approveBtn: document.getElementById('approveBtn'),
            historyPanel: document.getElementById('historyPanel'),
            historyList: document.getElementById('historyList'),
            historyCount: document.getElementById('historyCount'),
            modal: document.getElementById('confirmModal'),
            modalText: document.getElementById('modalText'),
            modalYes: document.getElementById('modalYes'),
            modalNo: document.getElementById('modalNo'),
            errorMsg: document.getElementById('errorMsg'),
            errorText: document.getElementById('errorText')
        };

        function sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function isUrl(str) {
            try {
                new URL(str);
                return true;
            } catch {
                return false;
            }
        }

        function getTime() {
            return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }

        function playBeep() {
            try {
                if (!state.audio) {
                    state.audio = new (window.AudioContext || window.webkitAudioContext)();
                }
                const t = state.audio.currentTime;
                const o = state.audio.createOscillator();
                const g = state.audio.createGain();
                o.connect(g);
                g.connect(state.audio.destination);
                o.frequency.value = 800;
                g.gain.setValueAtTime(0.15, t);
                g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
                o.start(t);
                o.stop(t + 0.08);
            } catch (e) {}
        }

        function loadHistory() {
            try {
                state.history = JSON.parse(localStorage.getItem('barcodes_pro') || '[]');
            } catch {
                state.history = [];
            }
            updateScanCount();
        }

        function saveHistory() {
            try {
                localStorage.setItem('barcodes_pro', JSON.stringify(state.history));
            } catch {}
        }

        function addHistory(data) {
            state.history.unshift({ data, time: getTime(), id: Date.now() });
            if (state.history.length > 200) state.history.pop();
            saveHistory();
            updateScanCount();
            drawHistory();
        }

        function deleteFromHistory(id) {
            state.history = state.history.filter(item => item.id !== id);
            saveHistory();
            updateScanCount();
            drawHistory();
        }

        function updateScanCount() {
            DOM.scanCount.textContent = state.history.length;
            DOM.historyCount.textContent = state.history.length;
        }

        function drawHistory() {
            DOM.historyList.innerHTML = '';
            if (state.history.length === 0) {
                DOM.historyPanel.classList.remove('show');
                return;
            }
            DOM.historyPanel.classList.add('show');
            state.history.slice(0, 20).forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                const txt = item.data.length > 25 ? item.data.substring(0, 25) + '...' : item.data;
                li.innerHTML = `
                    <div class="history-item-text" title="${sanitize(item.data)}">${sanitize(txt)}</div>
                    <button class="history-item-delete" data-id="${item.id}">🗑</button>
                `;
                DOM.historyList.appendChild(li);
            });
        }

        function onScan(text, result) {
            const now = Date.now();
            if (text === state.lastScanned && now - state.lastTime < 600) return;
            if (!text?.trim()) return;

            state.lastScanned = text;
            state.lastTime = now;

            const format = result?.result?.format?.formatName || 'Bilinmiyor';

            if (isUrl(text)) {
                DOM.resultText.innerHTML = `<a href="${text}" target="_blank" rel="noopener">${sanitize(text)}</a>`;
            } else {
                DOM.resultText.textContent = sanitize(text);
            }

            DOM.resultFormat.textContent = format;
            DOM.resultPanel.classList.add('show');
            playBeep();
        }

        function showError(msg) {
            DOM.errorText.textContent = msg;
            DOM.errorMsg.style.display = 'block';
        }

        function initScanner() {
            try {
                const scanner = new Html5QrcodeScanner('reader', {
                    fps: 15,
                    qrbox: { width: 200, height: 200 },
                    facingMode: 'environment',
                    rememberLastUsedCamera: true,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                }, false);
                state.scanner = scanner;
                scanner.render(onScan, () => {});
            } catch (e) {
                console.error('Scanner Error:', e);
                showError('Kamera başlatılamadı. Lütfen kamera izinlerini kontrol edin ve sayfayı yenileyin.');
            }
        }

        // Events
        DOM.copyBtn.addEventListener('click', () => {
            if (!state.lastScanned) return;
            navigator.clipboard.writeText(state.lastScanned).then(() => {
                const orig = DOM.copyBtn.textContent;
                DOM.copyBtn.textContent = '✓ Kopyalandı!';
                setTimeout(() => { DOM.copyBtn.textContent = orig; }, 1000);
            });
        });

        DOM.approveBtn.addEventListener('click', () => {
            if (!state.lastScanned) return;
            state.pending = state.lastScanned;
            DOM.modalText.textContent = state.lastScanned;
            DOM.modal.classList.add('active');
        });

        DOM.modalYes.addEventListener('click', () => {
            if (state.pending) {
                addHistory(state.pending);
                DOM.modal.classList.remove('active');
                DOM.resultPanel.classList.remove('show');
                DOM.resultText.innerHTML = '';
                DOM.resultFormat.textContent = '';
                state.lastScanned = '';
                state.pending = null;
            }
        });

        DOM.modalNo.addEventListener('click', () => {
            DOM.modal.classList.remove('active');
        });

        DOM.historyList.addEventListener('click', (e) => {
            if (e.target.classList.contains('history-item-delete')) {
                deleteFromHistory(parseInt(e.target.dataset.id));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') DOM.modalNo.click();
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            drawHistory();
            initScanner();
        });

        window.addEventListener('beforeunload', () => {
            if (state.scanner) try { state.scanner.clear(); } catch (e) {}
            if (state.audio) state.audio.close();
        });
    </script>

</body>
</html>
