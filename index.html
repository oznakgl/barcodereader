<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Barkod Okuyucu</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            flex-direction: column;
            -webkit-text-size-adjust: 100%;
        }

        /* HEADER */
        .app-header {
            background: rgba(255, 255, 255, 0.98);
            padding: 10px 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #FF6B35, #FF4757);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-icon svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            font-size: 16px;
            font-weight: 700;
            color: #222;
            margin: 0;
        }

        .header-title p {
            font-size: 10px;
            color: #999;
            margin: 2px 0 0 0;
        }

        /* MAIN */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        /* SCANNER */
        .scanner-section {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        #reader__dashboard_section_swaplink,
        #reader__dashboard_section_fsr,
        #reader__control_button_switch_flashlight,
        #reader__control_button_switch_camera,
        #reader__scan_qr_button,
        #reader__dashboard_section_csr {
            display: none !important;
        }

        /* LASER - HIZLI (1.2 sn) */
        .laser-effect {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 0, 0, 0) 10%, 
                rgba(255, 50, 50, 1) 50%, 
                rgba(255, 0, 0, 0) 90%, 
                transparent 100%);
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            animation: laserMoveDown 1.2s ease-in-out infinite;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.9), 0 0 16px rgba(255, 0, 0, 0.6);
            z-index: 10;
        }

        @keyframes laserMoveDown {
            0% {
                top: 12%;
                box-shadow: 0 0 6px rgba(255, 0, 0, 0.7), 0 0 12px rgba(255, 0, 0, 0.4);
            }
            50% {
                top: 50%;
                box-shadow: 0 0 10px rgba(255, 0, 0, 1), 0 0 20px rgba(255, 0, 0, 0.7);
            }
            100% {
                top: 88%;
                box-shadow: 0 0 6px rgba(255, 0, 0, 0.7), 0 0 12px rgba(255, 0, 0, 0.4);
            }
        }

        /* CORNERS */
        .corner-marks {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .corner {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 107, 53, 0.5);
        }

        .corner.top-left {
            top: 4px;
            left: 4px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: 4px;
            right: 4px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: 4px;
            left: 4px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: 4px;
            right: 4px;
            border-left: none;
            border-top: none;
        }

        .info-text {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 8px;
            border-radius: 4px;
            z-index: 8;
        }

        /* RESULT PANEL */
        .result-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: white;
            border-top: 1px solid #ddd;
        }

        .result-panel.show {
            max-height: 280px;
            overflow-y: auto;
        }

        .result-inner {
            padding: 10px;
            color: #333;
        }

        .result-item {
            margin-bottom: 9px;
            background: linear-gradient(135deg, #f9f9f9, #ffffff);
            padding: 9px;
            border-radius: 6px;
            border-left: 3px solid #FF6B35;
        }

        .result-item strong {
            display: block;
            color: #666;
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .result-value {
            word-wrap: break-word;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #FF6B35;
            font-weight: 600;
            line-height: 1.3;
        }

        .result-value a {
            color: #0066cc;
            text-decoration: none;
            border-bottom: 1px solid #0066cc;
        }

        /* BUTTONS */
        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }

        .btn {
            border: none;
            padding: 8px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            touch-action: manipulation;
        }

        .btn-copy {
            background: linear-gradient(135deg, #FF6B35, #FF4757);
            color: white;
        }

        .btn-copy:active {
            transform: scale(0.96);
        }

        .btn-approve {
            background: #4CAF50;
            color: white;
        }

        .btn-approve:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            display: block;
            background: #FF6B35;
            color: white;
            padding: 5px;
            border-radius: 4px;
            font-size: 10px;
            text-align: center;
            margin-top: 7px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* HISTORY */
        .history-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: white;
            border-top: 1px solid #ddd;
        }

        .history-panel.show {
            max-height: 180px;
            overflow-y: auto;
        }

        .history-inner {
            padding: 10px;
            color: #333;
        }

        .history-title {
            font-size: 11px;
            font-weight: 700;
            color: #FF6B35;
            margin-bottom: 7px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            background: #f9f9f9;
            padding: 7px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 2px solid #FF6B35;
            font-size: 10px;
            line-height: 1.3;
            word-break: break-all;
        }

        .history-time {
            font-size: 8px;
            color: #999;
            margin-top: 2px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 10px;
            padding: 16px;
            max-width: 85%;
            color: #333;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.25s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-text {
            font-size: 11px;
            background: #f9f9f9;
            padding: 9px;
            border-radius: 5px;
            border-left: 3px solid #FF6B35;
            margin-bottom: 10px;
            word-break: break-all;
            font-family: monospace;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .modal-btn {
            border: none;
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .modal-yes {
            background: #4CAF50;
            color: white;
        }

        .modal-yes:active {
            transform: scale(0.96);
        }

        .modal-no {
            background: #f0f0f0;
            color: #333;
        }

        .modal-no:active {
            background: #e0e0e0;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF6B35;
            border-radius: 2px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .header-title h1 {
                font-size: 15px;
            }

            .result-panel.show,
            .history-panel.show {
                max-height: 240px;
            }
        }

        @media (orientation: landscape) {
            .app-header {
                padding: 8px 10px;
            }

            .result-panel.show,
            .history-panel.show {
                max-height: 140px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="app-header">
        <div class="header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4m6 0h4a2 2 0 0 0 2-2v-4M9 7h6M9 17h6M6 6h.01M6 18h.01M18 6h.01M18 18h.01"></path>
            </svg>
        </div>
        <div class="header-title">
            <h1>Barkod Okuyucu</h1>
            <p>QR & Barkod Taraması</p>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-container">
        <!-- SCANNER -->
        <div class="scanner-section">
            <div id="reader"></div>
            <div class="laser-effect"></div>
            <div class="corner-marks">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>
            <div class="info-text">📱 Barkodu ekrana yerleştir</div>
        </div>

        <!-- RESULT -->
        <div class="result-panel" id="resultPanel">
            <div class="result-inner">
                <div class="result-item">
                    <strong>📊 Okunan Veri</strong>
                    <div class="result-value" id="resultText"></div>
                </div>
                <div class="result-item">
                    <strong>🏷️ Barkod Tipi</strong>
                    <div class="result-value" id="resultFormat"></div>
                </div>
                <div class="button-row">
                    <button class="btn btn-copy" id="copyBtn">📋 Kopyala</button>
                    <button class="btn btn-approve" id="approveBtn">✓ Onayla</button>
                </div>
                <div class="status">✓ Tarandı</div>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="history-panel" id="historyPanel">
            <div class="history-inner">
                <div class="history-title">📜 Onaylı Taramalar</div>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="confirmModal">
        <div class="modal-box">
            <div class="modal-title">Listeye Ekle?</div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-yes" id="modalYes">✓ Evet</button>
                <button class="modal-btn modal-no" id="modalNo">✕ İptal</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            lastScanned: '',
            lastTime: 0,
            history: [],
            pending: null,
            scanner: null,
            audio: null
        };

        const DOM = {
            resultPanel: document.getElementById('resultPanel'),
            resultText: document.getElementById('resultText'),
            resultFormat: document.getElementById('resultFormat'),
            copyBtn: document.getElementById('copyBtn'),
            approveBtn: document.getElementById('approveBtn'),
            historyPanel: document.getElementById('historyPanel'),
            historyList: document.getElementById('historyList'),
            modal: document.getElementById('confirmModal'),
            modalText: document.getElementById('modalText'),
            modalYes: document.getElementById('modalYes'),
            modalNo: document.getElementById('modalNo')
        };

        // Utilities
        function sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function isUrl(str) {
            return str.startsWith('http://') || str.startsWith('https://');
        }

        function getTime() {
            return new Date().toLocaleTimeString('tr-TR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }

        // Sound
        function playBeep() {
            try {
                if (!state.audio) {
                    state.audio = new (window.AudioContext || window.webkitAudioContext)();
                }
                const t = state.audio.currentTime;
                const o = state.audio.createOscillator();
                const g = state.audio.createGain();
                o.connect(g);
                g.connect(state.audio.destination);
                o.frequency.value = 800;
                g.gain.setValueAtTime(0.15, t);
                g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
                o.start(t);
                o.stop(t + 0.08);
            } catch (e) {}
        }

        // History
        function loadHistory() {
            try {
                state.history = JSON.parse(localStorage.getItem('barcodes') || '[]');
            } catch {
                state.history = [];
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem('barcodes', JSON.stringify(state.history));
            } catch {}
        }

        function addHistory(data) {
            state.history.unshift({ data, time: new Date() });
            if (state.history.length > 100) state.history.pop();
            saveHistory();
            drawHistory();
        }

        function drawHistory() {
            DOM.historyList.innerHTML = '';
            if (state.history.length === 0) {
                DOM.historyPanel.classList.remove('show');
                return;
            }
            DOM.historyPanel.classList.add('show');
            state.history.slice(0, 15).forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                const txt = item.data.length > 30 ? item.data.substring(0, 30) + '...' : item.data;
                li.innerHTML = `${sanitize(txt)}<div class="history-time">${getTime()}</div>`;
                DOM.historyList.appendChild(li);
            });
        }

        // Scan
        function onScan(text, result) {
            const now = Date.now();
            if (text === state.lastScanned && now - state.lastTime < 600) return;
            if (!text?.trim()) return;

            state.lastScanned = text;
            state.lastTime = now;

            const format = result?.result?.format?.formatName || 'Bilinmiyor';

            if (isUrl(text)) {
                DOM.resultText.innerHTML = `<a href="${text}" target="_blank" rel="noopener">${sanitize(text)}</a>`;
            } else {
                DOM.resultText.textContent = sanitize(text);
            }

            DOM.resultFormat.textContent = format;
            DOM.resultPanel.classList.add('show');
            playBeep();
        }

        function initScanner() {
            try {
                const scanner = new Html5QrcodeScanner('reader', {
                    fps: 15,
                    qrbox: { width: 180, height: 180 },
                    facingMode: 'environment',
                    rememberLastUsedCamera: true,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                }, false);
                state.scanner = scanner;
                scanner.render(onScan, () => {});
            } catch (e) {
                console.error(e);
            }
        }

        // Events
        DOM.copyBtn.addEventListener('click', () => {
            if (!state.lastScanned) return;
            navigator.clipboard.writeText(state.lastScanned).then(() => {
                const orig = DOM.copyBtn.textContent;
                DOM.copyBtn.textContent = '✓ Kopyalandı';
                DOM.copyBtn.disabled = true;
                setTimeout(() => {
                    DOM.copyBtn.textContent = orig;
                    DOM.copyBtn.disabled = false;
                }, 1200);
            }).catch(() => {});
        });

        DOM.approveBtn.addEventListener('click', () => {
            if (!state.lastScanned) return;
            state.pending = state.lastScanned;
            DOM.modalText.textContent = state.lastScanned;
            DOM.modal.classList.add('active');
        });

        DOM.modalYes.addEventListener('click', () => {
            if (state.pending) {
                addHistory(state.pending);
                DOM.modal.classList.remove('active');
                DOM.resultPanel.classList.remove('show');
                DOM.resultText.innerHTML = '';
                DOM.resultFormat.textContent = '';
                state.lastScanned = '';
                state.pending = null;
            }
        });

        DOM.modalNo.addEventListener('click', () => {
            DOM.modal.classList.remove('active');
            state.pending = null;
        });

        DOM.modal.addEventListener('click', (e) => {
            if (e.target === DOM.modal) {
                DOM.modalNo.click();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            drawHistory();
            initScanner();
        });

        window.addEventListener('beforeunload', () => {
            if (state.scanner) try { state.scanner.clear(); } catch (e) {}
            if (state.audio) state.audio.close();
        });
    </script>

</body>
</html>
